<header class="header">
  <div class="header-bg-wrapper">
    <div class="container header-container">
      <nav class="nav">
        <a href="./index.html" class="header-logo-link">
          <picture>
            <source
              srcset="./img/header/header-logo-desk.png"
              media="(min-width: 1440px)"
              width="66"
              height="66" />
            <source
              srcset="./img/header/header-logo-mob.png"
              width="40"
              height="40" />
            <img
              class="header-logo-img"
              src="./img/header/header-logo-mob.png"
              alt="Logo"
              width="40"
              height="40" /></picture
        ></a>
        <ul class="nav-list">
          <li class="nav-list-item">
            <svg class="header-icon" width="16" height="16">
              <use href="./img/sprite.svg#icon-home"></use>
            </svg>
            <a class="nav-list-link" href="./index.html#home">Home</a>
          </li>
          <li class="nav-list-item">
            <svg class="header-icon" width="16" height="16">
              <use href="./img/sprite.svg#icon-gameplay"></use>
            </svg>
            <a class="nav-list-link" href="./index.html#gameplay">Gameplay</a>
          </li>
          <li class="nav-list-item">
            <svg class="header-icon" width="16" height="16">
              <use href="./img/sprite.svg#icon-upgrades"></use>
            </svg>
            <a class="nav-list-link" href="./index.html#upgrades">Upgrades</a>
          </li>
          <li class="nav-list-item">
            <svg class="header-icon" width="16" height="16">
              <use href="./img/sprite.svg#icon-world"></use>
            </svg>
            <a class="nav-list-link" href="./index.html#features">World</a>
          </li>
          <li class="nav-list-item">
            <svg class="header-icon" width="16" height="16">
              <use href="./img/sprite.svg#icon-faq"></use>
            </svg>
            <a class="nav-list-link" href="./index.html#faq">FAQ</a>

        </ul>
        <a

          target="_blank"
          rel="noopener noreferrer"
        >
          <svg class="header-download-icon" width="16" height="16">
            <use href="./img/sprite.svg#icon-download"></use></svg
          ><span class="header-cta-link-span">Download</span></a
        >

          <svg class="menu-icon" width="24" height="24">
            <use href="./img/sprite.svg#icon-menu"></use>
          </svg>
